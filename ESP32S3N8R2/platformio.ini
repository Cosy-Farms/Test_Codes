[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ----- Flash & Memory -----
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi   ; N8R2 = Octal PSRAM, not qspi

; ----- Partition Table -----
board_build.partitions = default_8MB.csv    ; ✅ fine, has OTA slots built-in

; ----- Upload & Monitor -----
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder   ; decodes crash stack traces

; ----- Build Flags -----
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ----- Libraries -----
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    chrisjoyce911/esp32FOTA
    adafruit/Adafruit NeoPixel