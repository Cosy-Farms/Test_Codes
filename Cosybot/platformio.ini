; ── Active: Arduino Mega 2560 (for OLED testing) ────────────
[env:megaatmega2560]
platform          = atmelavr
board             = megaatmega2560
framework         = arduino
monitor_speed     = 115200
monitor_filters   = direct

lib_deps =
    adafruit/Adafruit SH110X @ ^2.1.10
    adafruit/Adafruit GFX Library @ ^1.11.9

; ── Switch to this when ESP32 D1 Mini arrives ───────────────
; Uncomment this block and comment out the Mega block above.
;
; [env:d1_mini_esp32]
; platform      = espressif32
; board         = wemos_d1_mini32
; framework     = arduino
; monitor_speed = 115200
; lib_deps =
;     adafruit/Adafruit SH110X @ ^2.1.10
;     adafruit/Adafruit GFX Library @ ^1.11.9
;
; Note: Wire.begin() uses default SDA=21, SCL=22 on ESP32.
; If your OLED is on D1/D2, call Wire.begin(D2, D1) in setup().
